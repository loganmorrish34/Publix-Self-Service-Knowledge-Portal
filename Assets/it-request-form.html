<!DOCTYPE html>
<html>
  <body>
    <!-- Static skeleton so Netlify registers this form at build time. Never shown to users. -->
    <form name="it-support-request" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="employeeId" />
      <input type="text" name="department" />
      <input type="text" name="issueCategory" />
      <textarea name="description"></textarea>
      <input type="text" name="priority" />
    </form>
  </body>
</html>
